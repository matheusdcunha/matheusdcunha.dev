baseURL = 'https://matheusdcunha.dev/'
languageCode = 'pt-br'
defaultContentLanguage = 'pt-br'
title = 'Matheus da Cunha'
copyright = 'Matheus da Cunha'
enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/michenriksen/hugo-theme-til"

[outputs]
  home = ['html']
  section = ['html', 'rss', 'json']
  page = ['html']

[menus]
  [[menus.main]]
    name = 'Posts'
    pageRef = '/posts'
    weight = 10
  [[menus.main]]
    name = 'Sobre'
    pageRef = '/sobre'
    weight = 20

[markup]
  [markup.highlight]
    noClasses = false
    style = 'tokyonight-night'

  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

[params]
  description = 'Blog pessoal do Matheus da Cunha'
  showGraph = false
  [params.author]
    name = 'Matheus da Cunha'
