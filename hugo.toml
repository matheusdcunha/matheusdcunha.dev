baseURL = 'https://matheusdcunha.dev/'
languageCode = 'pt-BR'
defaultContentLanguage = 'pt-br'
title = 'matheusdcunha.dev'
copyright = 'matheusdcunha.dev'
enableRobotsTXT = true
enableGitInfo = true

[module]
[[module.imports]]
path = "github.com/michenriksen/hugo-theme-til"

[outputs]
home = ['html', 'rss']
section = ['html', 'rss', 'json']
page = ['html']

[taxonomies]
tag = 'tags'

[menus]
[[menus.main]]
name = 'Posts'
pageRef = '/posts'
weight = 10
[[menus.main]]
name = 'Sobre'
pageRef = '/sobre'
weight = 20

[markup]
[markup.highlight]
noClasses = false
style = 'tokyonight-night'

[markup.goldmark]
[markup.goldmark.parser]
wrapStandAloneImageWithinParagraph = false
[markup.goldmark.parser.attribute]
block = true

[params]
description = 'Blog pessoal do Matheus da Cunha'
showGraph = false
[params.author]
name = 'Matheus da Cunha'
